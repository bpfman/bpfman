---
extends: default
rules:
  line-length: disable
  document-start: disable
  comments:
    min-spaces-from-content: 1
  quoted-strings:
    required: only-when-needed
    quote-type: double
ignore:
  - libbpf/*
  - vendor/*
  - examples/config/default/*/kustomization.yaml
  - examples/config/selinux/*/kustomization.yaml
  # The shell testdata expect.yaml files are byte-exact test
  # fixtures, not formatting subjects.
  - cmd/bpfman-shell/testdata/**/*.yaml
