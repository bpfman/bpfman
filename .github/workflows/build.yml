name: build

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
    tags:
      - v*
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-license:
    runs-on: ubuntu-24.04
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4
      - name: Check License Header
        uses: apache/skywalking-eyes@5c5b974209f0de5d905f37deb69369068ebfc15c


  # Repository hygiene checks carried over from the removed Rust
  # build job: they gate formatting conventions repo-wide and are
  # independent of either implementation.
  checks:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout bpfman
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4

      - name: Install toml linter
        uses: taiki-e/install-action@e29814c376696105d80cec9e9efaa98bae8e7347 # @v2
        with:
          tool: taplo-cli

      - name: toml-lint
        run: taplo fmt --check

      - name: yaml-lint
        run: yamllint -c .yamllint.yaml --strict .

      - name: Check C formatting
        # vendor/ is excluded: it is regenerated wholesale by
        # `go mod vendor`, so it can carry neither formatting fixes
        # nor exemption markers.
        run: git ls-files -- '*.c' '*.h' ':!vendor' | xargs clang-format --dry-run --Werror

  ## Build go modules
  build-go:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arch: amd64
            filename: linux-x86_64
          - arch: arm64
            filename: linux-arm64
          - arch: ppc64le
            filename: linux-ppc64le
          - arch: s390x
            filename: linux-s390x
    runs-on: ubuntu-24.04

    name: Build Go Modules (${{ matrix.arch.arch }})
    steps:
      - name: Checkout bpfman
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4

      - name: Install go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # @v5
        with:
          # prettier-ignore
          go-version: '1.25' # yamllint disable-line rule:quoted-strings

      - name: Go mod check
        # Only need to run go mod once, so just pick one of the arch to run on.
        if: ${{ matrix.arch.arch == 'amd64' }}
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      # Go linting for the root module lives in the Go CI workflow
      # (go-ci.yaml), which pins golangci-lint and carries the
      # repository's .golangci.yml configuration.

      - name: Build Examples
        run: |
          cd examples
          GOARCH=${{ matrix.arch.arch }} make build


  build-docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qy \
            libxml2-dev \
            libxslt-dev \

      - name: Checkout bpfman
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4

      - name: Install required-version defined in pyproject.toml
        uses: astral-sh/setup-uv@v6

      - name: Mkdocs Build
        run: |
          uv run mkdocs build --strict


  # Creates Release
  # Copies built bpfman binaries to release artifacts
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout bpfman
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4

      - name: Install dependencies
        # clang and libbpf compile the dispatcher BPF objects the
        # bpfman binary embeds; the cross gcc toolchains satisfy
        # cgo (sqlite) for the non-native architectures.
        run: |
          sudo apt-get update
          sudo apt-get install -qy clang llvm libbpf-dev gcc-multilib libelf-dev \
            gcc-aarch64-linux-gnu gcc-powerpc64le-linux-gnu gcc-s390x-linux-gnu

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - name: Install go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # @v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set env
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          if [[ ${GITHUB_REF#refs/*/} =~ "rc" ]]; then
            echo "PRE_RELEASE=true" >> $GITHUB_ENV
          else
            echo "PRE_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build bpfman Release Binaries
        # Static per-architecture builds of the Go bpfman binary,
        # packaged under the artefact names the release step has
        # always published.
        run: |
          make dispatcher/tc_dispatcher.bpf.o dispatcher/xdp_dispatcher_v2.bpf.o
          build() {
            arch="$1"; cc="$2"; filename="$3"
            rm -f bin/bpfman
            GOARCH="$arch" CC="$cc" CGO_ENABLED=1 make bpfman-compile STATIC=1
            tar -C bin -czvf "bpfman-linux-${filename}.tar.gz" bpfman
          }
          build amd64 gcc x86_64
          build arm64 aarch64-linux-gnu-gcc arm64
          build ppc64le powerpc64le-linux-gnu-gcc ppc64le
          build s390x s390x-linux-gnu-gcc s390x

      - name: release
        # Revert softprops/action-gh-release from v2.2.0 to v2.1.0 due to
        # "Error: Request body length does not match content-length header"
        # https://github.com/softprops/action-gh-release/issues/556
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # @v2
        with:
          body_path: ./changelogs/CHANGELOG-${{ env.RELEASE_VERSION }}.md
          prerelease: ${{ env.PRE_RELEASE }}
          files: |
            bpfman-linux-x86_64.tar.gz
            bpfman-linux-arm64.tar.gz
            bpfman-linux-ppc64le.tar.gz
            bpfman-linux-s390x.tar.gz

  build-workflow-complete:
    needs:
      [
        check-license,
        checks,
        build-go,
        build-docs,
      ]
    runs-on: ubuntu-24.04
    steps:
      - name: Build Complete
        run: echo "Build Complete"
