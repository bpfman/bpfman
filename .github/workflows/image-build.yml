name: bpfman-image-build

# IMAGE_REGISTRY below selects the destination for every image.
# The quay.io login steps arm only when it points at quay.io, so
# pointing it at a scratch registry (e.g. ttl.sh) lets a fork
# prove the pipeline end to end -- image names, tag rules, and
# signing unchanged -- without release credentials.

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
    tags:
      - v*
  pull_request:
    paths:
      - .github/workflows/image-build.yml
      - Dockerfile.bpfman
      - Containerfile.bytecode.multi.arch
      - examples/**/container-deployment/Containerfile**
  workflow_dispatch:

env:
  IMAGE_REGISTRY: quay.io

jobs:
  # Build bpfman and store the bpfman CLI binary in artifacts for the
  # "build-and-push-bytecode-images" step. It will be used to generate
  # build args with the "bpfman image generate-build-args" command.
  # The binary is the Go implementation; the dispatcher BPF objects
  # are compiled first because the dispatcher package embeds them at
  # compile time.
  build-bpfman-for-build-arg-gen:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout bpfman
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qy clang llvm libbpf-dev gcc-multilib libelf-dev pkgconf

      - name: Read Go version from Makefile
        run: echo "GO_VERSION=$(make -s print-go-version)" >> "$GITHUB_ENV"

      - name: Install Golang
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # @v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build bpfman binary
        run: |
          make dispatcher/tc_dispatcher.bpf.o dispatcher/xdp_dispatcher_v2.bpf.o
          make bpfman-compile

      - name: archive bpfman binary
        run: |
          cd bin
          tar -czvf bpfman.tar.gz bpfman

      - name: Archive bpfman Binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4
        with:
          name: bpfman-for-build-args
          path: |
            ./bin/bpfman.tar.gz

  # Build and push the bpfman daemon image via the repository's own
  # image tooling (make build-image): the in-container multi-arch
  # build also bakes the attestation metadata into the binary
  # (IMAGE_REF, SIGNER_IDENTITY, OIDC_ISSUER), so `bpfman version`
  # prints a ready-to-run cosign verify command for the image it
  # shipped in. The push and signing are gated on push events; pull
  # requests get a cache-only build.
  build-and-push-bpfman-image:
    permissions:
      contents: read
      packages: write
      id-token: write # needed for signing the images with GitHub OIDC Token
    runs-on: ubuntu-24.04
    steps:
      - name: Set image reference
        run: echo "BPFMAN_IMG=${IMAGE_REGISTRY}/bpfman/bpfman:latest" >> "$GITHUB_ENV"

      - name: Checkout bpfman
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # @v3

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # @v3.8.2

      - name: Login to quay.io/bpfman
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # @v1
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.IMAGE_REGISTRY == 'quay.io' }}
        with:
          registry: quay.io
          username: ${{ secrets.BPFMAN_USERNAME }}
          password: ${{ secrets.BPFMAN_ROBOT_TOKEN }}

      - name: Build and push multi-arch image
        env:
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          make build-image \
            EXTRA_GO_LDFLAGS="-s -w" \
            IMAGE_REF="${BPFMAN_IMG%:*}" \
            SIGNER_IDENTITY=https://github.com/${{ github.repository }}/.github/workflows/image-build.yml@${{ github.ref }} \
            OIDC_ISSUER=https://token.actions.githubusercontent.com \
            PLATFORMS=linux/amd64,linux/arm64,linux/ppc64le,linux/s390x \
            ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 'PUSH=1' || '' }} \
            BUILDX_EXTRA_ARGS="--cache-from type=gha --cache-to type=gha,mode=max --metadata-file=${RUNNER_TEMP}/buildx-meta.json"

      - name: Sign published image with cosign
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        run: |
          make cosign-sign \
            BUILDX_METADATA_FILE="${RUNNER_TEMP}/buildx-meta.json"

  verify-bpfman-image:
    name: Verify bpfman image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-and-push-bpfman-image
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Set image reference
        # Must match the BPFMAN_IMG used in build-and-push-bpfman-image;
        # this job pulls the image that job pushed.
        run: echo "BPFMAN_IMG=${IMAGE_REGISTRY}/bpfman/bpfman:latest" >> "$GITHUB_ENV"

      - name: Verify image metadata
        run: |
          output=$(docker run --rm -e BPFMAN_MODE= "$BPFMAN_IMG" version)
          echo "$output"
          echo "$output" | grep -q "${{ github.sha }}" || { echo "FAIL: expected git commit ${{ github.sha }}"; exit 1; }
          echo "$output" | grep -q "${{ github.event.head_commit.timestamp }}" || { echo "FAIL: expected build date ${{ github.event.head_commit.timestamp }}"; exit 1; }
          echo "$output" | grep -q "${{ matrix.platform }}" || { echo "FAIL: expected platform ${{ matrix.platform }}"; exit 1; }

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # @v3.8.2

      - name: Verify cosign signature
        # Asserts a sigstore signature exists on the published
        # image, that it was issued by the GitHub Actions OIDC
        # provider, that the signing identity is this workflow on
        # this repository, and that the signature was made by the
        # current commit rather than a prior run's stale signature
        # on the floating :latest tag.
        run: |
          set -euo pipefail
          cosign verify "$BPFMAN_IMG" \
            --certificate-identity-regexp 'https://github\.com/${{ github.repository }}/\.github/workflows/image-build\.yml@.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > "${RUNNER_TEMP}/cosign-verify.json"
          actual_sha=$(jq -r '.[0].optional.githubWorkflowSha' "${RUNNER_TEMP}/cosign-verify.json")
          if [ "${actual_sha}" != "${{ github.sha }}" ]; then
            echo "FAIL: signature is from sha=${actual_sha}, expected ${{ github.sha }}" >&2
            jq '.[0].optional' "${RUNNER_TEMP}/cosign-verify.json" >&2
            exit 1
          fi
          echo "Signature verified: githubWorkflowSha=${actual_sha}"

      - name: Verify cosign signature via binary's embedded attestation
        # Self-consistency check between the attestation the binary
        # carries in its version output and the signature actually
        # applied: a typo in IMAGE_REF or SIGNER_IDENTITY in the
        # build args fails here even though the direct verification
        # above would pass.
        run: |
          set -euo pipefail
          docker run --rm -e BPFMAN_MODE= "$BPFMAN_IMG" version \
            | grep ^Attestation: \
            | sed 's/^Attestation: *//' \
            | sh \
            > "${RUNNER_TEMP}/embedded-verify.json"
          actual_sha=$(jq -r '.[0].optional.githubWorkflowSha' "${RUNNER_TEMP}/embedded-verify.json")
          if [ "${actual_sha}" != "${{ github.sha }}" ]; then
            echo "FAIL: embedded-attestation verify returned sha=${actual_sha}, expected ${{ github.sha }}" >&2
            jq '.[0].optional' "${RUNNER_TEMP}/embedded-verify.json" >&2
            exit 1
          fi
          echo "Embedded attestation verified: githubWorkflowSha=${actual_sha}"

  # Build all the userspace example images and push them to the registry.
  build-and-push-userspace-images:
    permissions:
      contents: read
      packages: write
      id-token: write # needed for signing the images with GitHub OIDC Token

    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - repository: bpfman-userspace
            image: go-xdp-counter
            context: .
            dockerfile: ./examples/go-xdp-counter/container-deployment/Containerfile.go-xdp-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - repository: bpfman-userspace
            image: go-tc-counter
            context: .
            dockerfile: ./examples/go-tc-counter/container-deployment/Containerfile.go-tc-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - repository: bpfman-userspace
            image: go-tcx-counter
            context: .
            dockerfile: ./examples/go-tcx-counter/container-deployment/Containerfile.go-tcx-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - # build_language: go - Not building locally, so don't install go tools
            repository: bpfman-userspace
            image: go-tracepoint-counter
            context: .
            dockerfile: ./examples/go-tracepoint-counter/container-deployment/Containerfile.go-tracepoint-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - repository: bpfman-userspace
            image: go-kprobe-counter
            context: .
            dockerfile: ./examples/go-kprobe-counter/container-deployment/Containerfile.go-kprobe-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - repository: bpfman-userspace
            image: go-uprobe-counter
            context: .
            dockerfile: ./examples/go-uprobe-counter/container-deployment/Containerfile.go-uprobe-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - repository: bpfman-userspace
            image: go-uretprobe-counter
            context: .
            dockerfile: ./examples/go-uretprobe-counter/container-deployment/Containerfile.go-uretprobe-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - repository: bpfman-userspace
            image: go-target
            context: .
            dockerfile: ./examples/go-target/container-deployment/Containerfile.go-target
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

          - repository: bpfman-userspace
            image: go-app-counter
            context: .
            dockerfile: ./examples/go-app-counter/container-deployment/Containerfile.go-app-counter
            tags: |
              type=ref,event=branch
              type=ref,event=tag
              type=ref,event=pr
              type=sha,format=long
              # set latest tag for default branch
              type=raw,value=latest,enable={{is_default_branch}}

    name: Build Image (${{ matrix.image.image }})
    steps:
      - name: Checkout bpfman
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # @v4

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # @v3.8.2

      - name: Login to quay.io/bpfman-userspace
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # @v1
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.IMAGE_REGISTRY == 'quay.io' && matrix.image.repository == 'bpfman-userspace'}}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.BPFMAN_USERSPACE_USERNAME }}
          password: ${{ secrets.BPFMAN_USERSPACE_ROBOT_TOKEN }}

      - name: Extract metadata (tags, labels) for image
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # @v5.7.0
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ matrix.image.repository }}/${{ matrix.image.image }}
          tags: ${{ matrix.image.tags }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # @v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # @v3

      - name: Build and push
        id: build-push-image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # @v6
        with:
          platforms: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x
          push: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: ${{ matrix.image.dockerfile }}
          build-args: ${{ matrix.image.build_args }}
          context: ${{ matrix.image.context }}

      - name: Sign the images with GitHub OIDC Token
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        run: |
          readarray -t tags <<<"${{ steps.meta.outputs.tags }}"
          for tag in ${tags[@]}; do
            cosign sign -y "${tag}@${{ steps.build-push-image.outputs.digest }}"
          done

  # Build all the bytecode images and push them to quay.io. This includes the dispatchers
  # for TC and XDP, all the go-*-counter examples and the bytecode images used by integration
  # tests.
  build-and-push-bytecode-images:
    needs: [build-bpfman-for-build-arg-gen]
    permissions:
      contents: read
      packages: write
      id-token: write # needed for signing the images with GitHub OIDC Token

    runs-on: ubuntu-24.04
    strategy:
